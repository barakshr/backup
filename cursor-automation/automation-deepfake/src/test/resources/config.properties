# ==============================================================================
# Deepfake module configuration (mandatory keys validated at startup)
# ==============================================================================
# Infra baseline: infra-defaults.properties (from automation-infra).
# This file overlays it. Env vars override any key (e.g. DEMO_TOOL_USERNAME).
# ==============================================================================

# --- Mandatory (all modules) ---
aut.base.url=https://deepfake-demo-server.staging.ironscales.io
tenant.id=1234567890
browser.type=chrome
browser.headless=true

# --- DemoTool (custom / module-specific) ---
demo.tool.base.url=https://deepfake-demo-server.staging.ironscales.io
demo.tool.username=YOUR_DEMO_TOOL_USERNAME
demo.tool.password=YOUR_DEMO_TOOL_PASSWORD

# --- Optional HTTP overrides (defaults in infra-defaults.properties) ---
# http.read.timeout=60
# http.connection.timeout=30
# http.log.requests=true

