# ==============================================================================
# IS Automation Framework - Default Configuration
# ==============================================================================
# Values here are defaults. Override with environment variables (Jenkins, local).
# Env var key = property key uppercased with dots replaced by underscores.
# e.g. environment=qa can be overridden by env var ENVIRONMENT=staging
# ==============================================================================

# Environment target
environment=qa

# Browser configuration (for UI tests - stage 2+)
browser.type=chrome
browser.headless=true

# Logging
log.level=INFO
