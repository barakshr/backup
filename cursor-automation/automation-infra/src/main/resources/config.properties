# ==============================================================================
# IS Automation Framework - Default Configuration
# ==============================================================================
# Values here are defaults. Override with environment variables (Jenkins, local).
# Env var key = property key uppercased with dots replaced by underscores.
# e.g. browser.type=chrome can be overridden by env var BROWSER_TYPE=firefox
# ==============================================================================

# Environment target
environment=qa

# Browser configuration
# browser.type: chrome | firefox | edge  (case-insensitive)
browser.type=chrome
browser.headless=true

# Retry
# Number of times a failed test is automatically retried before marking as failed.
retry.max=1

# Logging
log.level=INFO
