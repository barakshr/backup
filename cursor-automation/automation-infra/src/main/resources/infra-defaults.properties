# ==============================================================================
# IS Automation Framework — Infra baseline (merged before module config.properties)
# ==============================================================================
# Only true infra-level defaults here.
# browser.*, aut.*, environment belong in the product module's config.properties.
# Override with environment variables (Jenkins, local).
# Env var key = property key uppercased with dots replaced by underscores.
# ==============================================================================

# Retry
# Number of times a failed test is automatically retried before marking as failed.
retry.max=1

# Logging
log.level=INFO

# HTTP client defaults (optional overrides in module config.properties)
http.read.timeout=60
http.connection.timeout=30
http.log.requests=true
